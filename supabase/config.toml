# Supabase local and CLI config.
# See https://supabase.com/docs/guides/cli/config

[functions.create-checkout-session]
# Allow invocation without JWT verification (e.g. anon key). Used when gateway returns 401
# despite correct Authorization header. Function only creates Stripe Checkout session; payment is on Stripe.
verify_jwt = false

[functions.create-order]
# NOTE: config.toml verify_jwt ONLY affects the local Supabase dev runtime.
# For the hosted project you must deploy with --no-verify-jwt:
#   supabase functions deploy create-order --no-verify-jwt
# Data security is enforced by Postgres RLS on user_addresses / orders / shipments.
verify_jwt = false
